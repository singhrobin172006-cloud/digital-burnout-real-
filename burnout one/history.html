<head>

  <style>
    body {
      background: black;
      color: #00f0ff;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      border: 1px solid #00f0ff;
      padding: 15px;
      margin: 10px;

<body>

<h1>📊 History</h1>

<div id="history"></div>

<script src="history.js"></script>
<!-- 🔥 GLOBAL NAVBAR (WORKS ON ALL PAGES) -->
<div style="
  position:fixed;
  top:10px;
  left:50%;

">

</div>

<script>
function goPage(page){

}
</script>

<style>
button{
