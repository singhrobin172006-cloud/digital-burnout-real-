<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognitive Assessment</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1 class="dashboard-title">Cognitive Assessment</h1>

<div class="dashboard">

    <!-- LEFT PANEL -->
    <div class="panel left">

        <div class="slider-group">
            <label>Sleep (hrs): <span id="sleepVal">7</span></label>
            <input type="range" min="0" max="24" value="7" id="sleep">
        </div>

        <div class="slider-group">
            <label>Study (hrs): <span id="studyVal">4</span></label>
            <input type="range" min="0" max="24" value="4" id="study">
        </div>

        <div class="slider-group">
            <label>Screen (hrs): <span id="screenVal">5</span></label>
            <input type="range" min="0" max="24" value="5" id="screen">
        </div>

        <div class="slider-group">
            <label>Stress: <span id="stressVal">5</span></label>
            <input type="range" min="0" max="10" value="5" id="stress">
        </div>

        <div class="slider-group">
            <label>Mood: <span id="moodVal">8</span></label>
            <input type="range" min="0" max="10" value="8" id="mood">
        </div>

        <div class="buttons">
            <button onclick="analyze()">Analyze</button>
            <button onclick="resetAll()">Reset</button>
        </div>

        <h2 id="score">Score: 50/100</h2>
<button onclick="goRecovery()" class="btn">
View Recovery Plan
</button>
        <div id="insight" class="insight">
            AI Insight: Balanced performance detected.
        </div>
        <div id="recommendation" class="recommendation">
    AI Recommendation: Maintain your routine.
</div>

        <div id="risk" class="risk">⚡ Moderate Burnout Risk</div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="panel right">

        <div class="chart-box">
            <h3>AI 7-Day Prediction</h3>
            <canvas id="lineChart"></canvas>
        </div>

        <div class="chart-box">
            <h3>Burnout Risk Donut</h3>
            <canvas id="donutChart"></canvas>
        </div>

        <div class="chart-box">
            <h3>Performance Meter</h3>
            <canvas id="meterChart"></canvas>
        </div>

    </div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
<button onclick="goHistory()">📊 View History</button>
