<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Focus Mode</title>
<link rel="stylesheet" href="focus.css">
</head>

<body>

<div class="focus-wrapper">
    <div class="circle-card">

        <h1 class="title">Focus Mode</h1>

        <div class="timer-container">
            <div id="timer">25:00</div>
        </div>

        <div class="buttons">
            <!-- ✅ TIMER CONTROL -->
            <button onclick="startTimer()">Start</button>
            <button onclick="pauseTimer()">Pause</button>
            <button onclick="resetTimer()">Reset</button>
        </div>

        <!-- 🔥 NEW BUTTON (FACE SCAN) -->
        <div style="margin-top:15px;">
            <button onclick="location.href='face.html'">AI Face Scan</button>
        </div>

        <div class="session-box">
            <p>Sessions</p>
            <h2 id="sessions">0</h2>
        </div>

        <button class="back-btn" onclick="location.href='recovery.html'">← Back</button>

    </div>
</div>

<script src="focus.js"></script>
<!-- 🔥 GLOBAL NAVBAR (WORKS ON ALL PAGES) -->
<div style="
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:999;
">

  <button onclick="goPage('index.html')">Home</button>
  <button onclick="goPage('dashboard.html')">Dashboard</button>
  <button onclick="goPage('face.html')">Face</button>
  <button onclick="goPage('focus.html')">Focus</button>
  <button onclick="goPage('recovery.html')">Recovery</button>
  <button onclick="goPage('history.html')">History</button>

</div>

<script>
function goPage(page){
  window.location.href = page;
}
</script>

<style>
button{
  padding:8px 14px;
  border-radius:8px;
  border:1px solid #00f0ff;
  background:rgba(0,0,0,0.4);
  color:#00f0ff;
  cursor:pointer;
  backdrop-filter:blur(6px);
  box-shadow:0 0 10px #00f0ff;
  transition:0.2s;
}

button:hover{
  background:#00f0ff;
  color:black;
}
</style>
</body>
</html>
<button onclick="goHistory()">📊 History</button>
