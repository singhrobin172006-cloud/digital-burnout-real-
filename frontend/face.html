<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Cognitive Scan</title>

<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
    color:#00f5ff;
}

.circle{
    width:820px;
    height:820px;
    border-radius:50%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    background:rgba(0,255,255,0.05);
    backdrop-filter:blur(25px);

    box-shadow:
        0 0 120px #00f5ff,
        0 0 200px rgba(0,255,255,0.8);
}

video{
    width:340px;
    border-radius:15px;
    box-shadow:0 0 30px #00f5ff;
}

h2{
    font-size:32px;
    margin-bottom:10px;
}

#status{
    font-size:18px;
    margin-top:8px;
}

/* RESULT TEXT BIGGER */
.result-box p{
    margin:6px;
    font-size:22px;
}

.big{
    font-size:34px;
    font-weight:bold;
}

#solution{
    font-size:20px;
    margin-top:10px;
    max-width:500px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:1px solid #00f5ff;
    background:transparent;
    color:#00f5ff;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="circle">

<h2>AI Cognitive Scan</h2>

<video id="video" autoplay muted playsinline></video>

<p id="status">Analyzing micro-expressions...</p>

<div class="result-box">
    <p id="burnout" class="big">Burnout: --</p>
    <p id="focus">Focus Score: --</p>
    <p id="state">State: --</p>
    <p id="screen">Screen Time: --</p>
    <p id="fatigue">Fatigue Index: --</p>
    <p id="stability">Attention Stability: --</p>
    <p id="solution">Recommendation: --</p>
</div>

<button onclick="location.href='focus.html'">← Back</button>

</div>

<script src="face.js"></script>
<!-- 🔥 GLOBAL NAVBAR (WORKS ON ALL PAGES) -->
<div style="
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:999;
">

  <button onclick="goPage('index.html')">Home</button>
  <button onclick="goPage('dashboard.html')">Dashboard</button>
  <button onclick="goPage('face.html')">Face</button>
  <button onclick="goPage('focus.html')">Focus</button>
  <button onclick="goPage('recovery.html')">Recovery</button>
  <button onclick="goPage('history.html')">History</button>

</div>

<script>
function goPage(page){
  window.location.href = page;
}
</script>

<style>
button{
  padding:8px 14px;
  border-radius:8px;
  border:1px solid #00f0ff;
  background:rgba(0,0,0,0.4);
  color:#00f0ff;
  cursor:pointer;
  backdrop-filter:blur(6px);
  box-shadow:0 0 10px #00f0ff;
  transition:0.2s;
}

button:hover{
  background:#00f0ff;
  color:black;
}
</style>
</body>
</html>
<button onclick="goHistory()">📊 History</button>
