<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recovery Intelligence</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#000;
    color:#fff;
    font-family:Poppins;
    padding:30px;
}

.title{
    text-align:center;
    font-size:3.2rem;
    color:#00f0ff;
    text-shadow:0 0 10px #00f0ff,0 0 20px #00f0ff,0 0 40px #00f0ff;
    margin-bottom:30px;
}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

/* GLASS CARD */
.card{
    background:rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(10px);
    border:1px solid rgba(0,255,255,0.3);
    border-radius:18px;
    padding:25px;
    box-shadow:
        0 0 15px #00f0ff,
        inset 0 0 10px rgba(0,255,255,0.3);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.02);
    box-shadow:0 0 25px #00f0ff;
}

h2{font-size:1.8rem;}
h3{font-size:1.3rem; color:#00f0ff;}
p, li{font-size:1.1rem; line-height:1.6;}

.alert{
    padding:12px;
    border-radius:10px;
    margin:12px 0;
    text-align:center;
    font-weight:bold;
    font-size:1.1rem;
}

.high{background:#ff1a1a;}
.moderate{background:#ffaa00;}
.low{background:#00cc66;}

/* 🔥 BIGGER GRAPH */
.chart-box{
    height:500px;
}

button{
    margin-top:10px;
    padding:10px 16px;
    border:none;
    border-radius:10px;
    background:#00f0ff;
    cursor:pointer;
    font-size:1rem;
}

.metric{
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    background:rgba(0,255,255,0.08);
}
</style>

</head>

<body>

<h1 class="title">Recovery Intelligence</h1>

<div class="container">

<div class="card">

<h2 id="scoreText"></h2>
<div id="alertBox" class="alert"></div>

<div class="metric" id="fatigue"></div>
<div class="metric" id="focusScore"></div>

<h3>Root Cause Analysis</h3>
<p id="cause"></p>

<h3>Cognitive Impact</h3>
<p id="impact"></p>

<h3>Recovery Plan</h3>
<ul id="plan"></ul>

<h3>Pomodoro Focus</h3>
<button onclick="startFocusMode()">Start Focus (25 min)</button>

<h3>Progress</h3>
<p id="progress"></p>

<button onclick="goHistory()">📊 History</button>

</div>

<div class="card">
<h3>Recovery Projection</h3>
<div class="chart-box">
<canvas id="recoveryChart"></canvas>
</div>
</div>

</div>

<script>

/* DATA */
const score = parseInt(localStorage.getItem("score")) || 50;
const sleep = parseInt(localStorage.getItem("sleep")) || 7;
const stress = parseInt(localStorage.getItem("stress")) || 5;
const screen = parseInt(localStorage.getItem("screen")) || 5;

const lastScore = parseInt(localStorage.getItem("lastScore")) || score;
localStorage.setItem("lastScore", score);

/* SCORE */
document.getElementById("scoreText").innerText = "Score: " + score + "/100";

/* METRICS */
const fatigueIndex = Math.round((stress*10 + screen*5 - sleep*3));
const focusScore = Math.max(0, 100 - fatigueIndex);

document.getElementById("fatigue").innerText =
"⚡ Fatigue Index: " + fatigueIndex;

document.getElementById("focusScore").innerText =
"🧠 Focus Score: " + focusScore + "/100";

/* ALERT */
const alertBox = document.getElementById("alertBox");

let cause="", impact="", plan=[];

if(score < 40){
    alertBox.innerText = "Critical Burnout";
    alertBox.className="alert high";

    cause = sleep < 6 ? "Severe sleep deficit detected." : "Extreme digital overload.";
    impact = "Brain fatigue, low memory, attention collapse.";

    plan = ["Sleep 7-8 hrs","Reduce screen time","Pomodoro","Cold water","Breathing","No multitasking","Walk"];
}
else if(score < 70){
    alertBox.innerText = "Moderate Burnout";
    alertBox.className="alert moderate";

    cause = "Routine imbalance.";
    impact = "Focus drops.";

    plan = ["Fix sleep","Reduce distractions","Pomodoro","Breaks","Limit social media"];
}
else{
    alertBox.innerText = "Optimal State";
    alertBox.className="alert low";

    cause = "Balanced lifestyle.";
    impact = "High performance.";

    plan = ["Maintain routine","Track productivity"];
}

document.getElementById("cause").innerText = cause;
document.getElementById("impact").innerText = impact;

/* PLAN */
const planEl = document.getElementById("plan");
planEl.innerHTML="";
plan.forEach(p=>{
    const li=document.createElement("li");
    li.innerText=p;
    planEl.appendChild(li);
});

/* PROGRESS */
document.getElementById("progress").innerText =
"Last: "+lastScore+" | Current: "+score;

/* NAVIGATION */
function startFocusMode(){
    window.location.href = "focus.html";
}

function goHistory(){
    window.location.href = "history.html";
}

/* GRAPH WITH GRID LINES */
const growth = Array.from({length:7},(_,i)=> Math.min(100, score + i*5));

new Chart(document.getElementById("recoveryChart"),{
type:"line",
data:{
labels:["Today","+1","+2","+3","+4","+5","+6"],
datasets:[{
data:growth,
borderColor:"#00ffff",
backgroundColor:"rgba(0,255,255,0.25)",
borderWidth:3,
pointRadius:5,
fill:true
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{display:false}},
scales:{
x:{
grid:{color:"rgba(255,255,255,0.1)"},
ticks:{color:"#ccc"}
},
y:{
grid:{color:"rgba(255,255,255,0.1)"},
ticks:{color:"#ccc"}
}
}
}
});

/* BACKEND SAVE */
function saveData(page, payload) {
  fetch("http://127.0.0.1:5000/save", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({page, payload})
  });
}

if (!localStorage.getItem("recoverySaved")) {
  saveData("recovery", { score, fatigueIndex, focusScore });
  localStorage.setItem("recoverySaved", "true");
}

</script>
</style>
<!-- 🔥 GLOBAL NAVBAR (WORKS ON ALL PAGES) -->
<div style="
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:999;
">

  <button onclick="goPage('index.html')">Home</button>
  <button onclick="goPage('dashboard.html')">Dashboard</button>
  <button onclick="goPage('face.html')">Face</button>
  <button onclick="goPage('focus.html')">Focus</button>
  <button onclick="goPage('recovery.html')">Recovery</button>
  <button onclick="goPage('history.html')">History</button>

</div>

<script>
function goPage(page){
  window.location.href = page;
}
</script>

<style>
button{
  padding:8px 14px;
  border-radius:8px;
  border:1px solid #00f0ff;
  background:rgba(0,0,0,0.4);
  color:#00f0ff;
  cursor:pointer;
  backdrop-filter:blur(6px);
  box-shadow:0 0 10px #00f0ff;
  transition:0.2s;
}

button:hover{
  background:#00f0ff;
  color:black;
}
</style>


</body>
</html>
